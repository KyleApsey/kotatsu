name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    env:
      NUXT_PUBLIC_SUPABASE_URL: https://placeholder.supabase.co
      NUXT_PUBLIC_SUPABASE_KEY: sb_publishable_placeholder
      NUXT_PUBLIC_HOUSEHOLD_TZ: America/Detroit
      NUXT_PUBLIC_VAPID_PUBLIC_KEY: BPlaceholderVapidPublicKeyForTestingOnly

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test
